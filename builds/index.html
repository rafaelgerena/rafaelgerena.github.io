<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Builds — Rafael Gerena</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #F8F6F1;
      color: #1A1A1A;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      font-size: 16px;
      line-height: 1.6;
    }

    nav {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 1.5rem 3rem;
      border-bottom: 1px solid #D8D5CE;
    }

    .nav-name {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1rem;
      color: #1A1A1A;
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
    }

    .nav-links a {
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #1A1A1A;
      text-decoration: none;
    }

    .nav-links a:hover { opacity: 0.55; }

    main {
      max-width: 680px;
      margin: 0 auto;
      padding: 5rem 2rem 6rem;
    }

    .page-heading {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 400;
      margin-bottom: 1rem;
    }

    .page-intro {
      font-size: 0.95rem;
      color: #555;
      margin-bottom: 3.5rem;
      line-height: 1.65;
    }

    .link-list { display: flex; flex-direction: column; }

    .link-item {
      border-top: 1px solid #D8D5CE;
      padding: 1.25rem 0;
    }

    .link-item:last-child { border-bottom: 1px solid #D8D5CE; }

    .link-item a {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.1rem;
      color: #1A1A1A;
      text-decoration: none;
    }

    .link-item a:hover { opacity: 0.55; }

    footer {
      text-align: center;
      padding: 2.5rem 2rem;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      color: #999;
    }

    @media (max-width: 600px) {
      nav { padding: 1.25rem 1.5rem; }
      main { padding: 3rem 1.5rem 5rem; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="nav-name">Rafael Gerena</a>
    <div class="nav-links">
      <a href="/work/">Work</a>
      <a href="/builds/">Builds</a>
      <a href="/writing/">Writing</a>
    </div>
  </nav>

  <main>
    <h1 class="page-heading">Builds</h1>
    <p class="page-intro">AI tools and workflow automations built in production.</p>

    <div class="link-list">
      <div class="link-item">
        <a href="#">Speech Analyzer</a>
      </div>
      <div class="link-item">
        <a href="#">Research Pipeline</a>
      </div>
      <div class="link-item">
        <a href="#">Content Pipeline</a>
      </div>
    </div>
  </main>

  <footer>Rafael Gerena &nbsp;&middot;&nbsp; New York</footer>

</body>
</html>
